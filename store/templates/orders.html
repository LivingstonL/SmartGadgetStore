<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            padding: 40px;
            color: #1d1d1f;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
        th, td {
            padding: 15px;
            text-align: left;
        }
        th {
            background: #0071e3;
            color: white;
        }
        tr:nth-child(even) {
            background: #f9f9f9;
        }
        .status {
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 8px;
        }
        .Paid {
            background: #d4edda;
            color: #155724;
        }
        .Pending {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>

<h1>My Orders</h1>

<table>
    <tr>
        <th>Order ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Total</th>
        <th>Status</th>
    </tr>
    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.fullname }}</td>
        <td>{{ order.phone }}</td>
        <td>₹{{ order.total }}</td>
        <td><span class="status {{ order.status }}">{{ order.status }}</span></td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" style="text-align:center;">No orders yet.</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
