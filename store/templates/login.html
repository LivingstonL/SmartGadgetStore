<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family:Arial;
            background:#f0f2f5;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px lightgray;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#ff9900;
            border:none;
            border-radius:5px;
            font-weight:bold;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Login
        </button>
    </form>

</div>

</body>
</html>
