<!DOCTYPE html>
<html>
<head>
<title>Processing Payment</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    text-align:center;
}

.spinner{
    width:80px;
    height:80px;
    border:8px solid #ddd;
    border-top:8px solid #0071e3;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

#status{
    margin-top:25px;
    font-size:20px;
}
</style>

</head>
<body>

<div class="box">

    <div class="spinner"></div>

    <h2>Secure Payment</h2>

    <p id="status">Connecting to bank...</p>

</div>

<script>

const messages = [
    "Connecting to bank...",
    "Verifying UPI transaction...",
    "Checking merchant details...",
    "Authorizing payment...",
    "Generating invoice...",
    "Payment successful ✓"
];

let i = 0;

const timer = setInterval(function(){

    if(i < messages.length){
        document.getElementById("status").innerHTML = messages[i];
        i++;
    }

},1500);

setTimeout(function(){

    window.location.href =
    "/payment_success/{{ order.id }}/";

},9000);

</script>

</body>
</html>
